name: Apply Hardening (Create Branch + PR)

on:
  workflow_dispatch:
    inputs:
      skip-npm-install:
        description: "Set to true to skip dependency installation"
        required: false
        default: "false"

concurrency:
  group: hardening-workflow
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json

      - name: Apply Infrastructure Hardening
        shell: bash
        env:
          SKIP_NPM: ${{ github.event.inputs.skip-npm-install }}
        run: |
          set -Eeuo pipefail

          export SKIP_NPM="${SKIP_NPM:-false}"

          echo "========================================="
          echo "NAWI-EMPIRE001 Hardening Pipeline Started"
          echo "========================================="

          mkdir -p controllers

          # ----------------------------------------
          # Synchronize Node Engine Requirement
          # ----------------------------------------
          if [[ -f package.json ]]; then
            echo "Synchronizing Node engine requirement..."
            npm pkg set engines.node=">=20.0.0"
          else
            echo "package.json not found - skipping engine synchronization."
          fi

          # ----------------------------------------
          # Deterministic Dependency Installation
          # ----------------------------------------
          if [[ "$SKIP_NPM" != "true" ]]; then
            if [[ -f package-lock.json ]]; then
              echo "Running npm ci..."
              npm ci
            elif [[ -f package.json ]]; then
              echo "Lockfile missing - falling back to npm install..."
              npm install
            else
              echo "No package.json found - skipping npm installation."
            fi
          else
            echo "Dependency installation skipped by workflow input."
          fi

          # ----------------------------------------
          # Validation Gates
          # ----------------------------------------
          echo "Running syntax validation..."

          if [[ -f server.js ]]; then
            node --check server.js
          fi

          if [[ -f app.js ]]; then
            node --check app.js
          fi

          if [[ -d controllers ]]; then
            while IFS= read -r -d '' file; do
              echo "Validating ${file}"
              node --check "${file}"
            done < <(find controllers -type f -name "*.js" -print0)
          fi

          if [[ -d config ]]; then
            while IFS= read -r -d '' file; do
              echo "Validating ${file}"
              node --check "${file}"
            done < <(find config -type f -name "*.js" -print0)
          fi

          # ----------------------------------------
          # Stage Files
          # ----------------------------------------
          echo "Staging infrastructure changes..."

          [[ -f package.json ]] && git add package.json
          [[ -f package-lock.json ]] && git add package-lock.json
          [[ -d controllers ]] && git add controllers/
          [[ -d config ]] && git add config/
          [[ -f server.js ]] && git add server.js
          [[ -f app.js ]] && git add app.js

          echo "Hardening pipeline completed successfully."

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          branch: security/hardening-core
          base: main
          delete-branch: false

          commit-message: |
            chore: harden engine requirements and validate integrity

          title: |
            architecture: harden core framework

          body: |
            Automated hardening rollout for NAWI-EMPIRE001.

            Included improvements:
            - Synchronised Node.js engine requirements to v20
            - Added deterministic dependency installation
            - Added JavaScript syntax validation gates
            - Enabled npm dependency caching
            - Improved workflow resilience
            - Added automated pull request lifecycle management
            - Improved staging safety and repository integrity

          labels: |
            hardening
            infrastructure
            automation