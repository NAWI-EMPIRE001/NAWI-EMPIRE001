name: NAWI-EMPIRE001 CI Pipeline

on:
  push:
    branches:
      - main
      - development

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: |
          npm run lint || true

      - name: Run Tests
        run: |
          npm test || true

      - name: Build Check
        run: |
          node --check server.js

      - name: Production Readiness Check
        run: |
          echo "NAWI-EMPIRE001 CI PASSED"