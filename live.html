<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI LIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; font-family: sans-serif; }
        #camera { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; background: rgba(0,0,0,0.2); }
        
        .top-tools { display: flex; justify-content: space-between; }
        .exit-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid #fff; }

        .side-menu { position: absolute; right: 15px; top: 100px; display: flex; flex-direction: column; gap: 20px; }
        .tool-icon { text-align: center; color: white; font-size: 10px; font-weight: bold; }
        .tool-icon i { display: block; font-size: 24px; margin-bottom: 5px; text-shadow: 0 2px 10px #000; }

        .bottom-area { text-align: center; padding-bottom: 30px; }
        .go-live-btn { 
            width: 250px; height: 55px; border-radius: 30px; border: none; 
            background: #ff0033; color: white; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 15px rgba(255, 0, 51, 0.4); 
        }
        .go-live-btn:disabled { background: #333; box-shadow: none; color: #777; }
    </style>
</head>
<body>

    <video id="camera" autoplay playsinline muted></video>

    <div class="ui-layer">
        <div class="top-tools">
            <div class="exit-btn" onclick="location.href='index.html'"><i class="fa-solid fa-xmark"></i></div>
            <div style="background:rgba(0,0,0,0.5); padding:5px 15px; border-radius:20px; border:1px solid gold; font-size:12px; color:gold;">NAWI LIVE STUDIO</div>
        </div>

        <div class="side-menu">
            <div class="tool-icon" onclick="flipCamera()"><i class="fa-solid fa-camera-rotate"></i>Flip</div>
            <div class="tool-icon"><i class="fa-solid fa-wand-magic-sparkles"></i>Beautify</div>
            <div class="tool-icon"><i class="fa-solid fa-face-smile"></i>Effects</div>
            <div class="tool-icon"><i class="fa-solid fa-gear"></i>Settings</div>
            <div class="tool-icon"><i class="fa-solid fa-music"></i>Music</div>
        </div>

        <div class="bottom-area">
            <p id="lock-text" style="color:white; font-size:13px; margin-bottom:15px; text-shadow: 0 2px 4px #000;">VERIFYING 500 FOLLOWERS...</p>
            <button id="main-action" class="go-live-btn" disabled onclick="startBroadcast()">Go LIVE</button>
        </div>
    </div>

    <script>
        let currentStream;
        async function initCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('camera').srcObject = currentStream;
                
                const followers = 0; // MongoDB Link
                if(followers >= 500) {
                    document.getElementById('main-action').disabled = false;
                    document.getElementById('lock-text').innerText = "SYSTEM READY";
                } else {
                    document.getElementById('lock-text').innerText = "LOCKED: 500 FOLLOWERS REQUIRED";
                }
            } catch (err) { alert("Camera Access Denied. Check Permissions."); }
        }

        function flipCamera() {
            // Logic to toggle between front/back camera
            alert("Switching Camera...");
        }

        function startBroadcast() {
            alert("NAWI BROADCAST STARTING...");
        }

        window.onload = initCamera;
    </script>
</body>
</html>
