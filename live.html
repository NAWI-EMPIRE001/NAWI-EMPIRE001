<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI LIVE STUDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --red: #ff0033; --black: #050505; }
        body, html { margin: 0; padding: 0; background: var(--black); height: 100%; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
        #cam-preview { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        
        /* THE STUDIO INTERFACE */
        .studio-ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 40%, rgba(0,0,0,0.8) 100%); }
        
        /* TOP BAR: MONETIZATION & EXIT */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 12px; border-radius: 12px; border: 1px solid var(--gold); min-width: 140px; }
        .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 8px; }
        .progress-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: 0.5s; }

        /* CENTER: ACTIONS */
        .side-tools { position: absolute; right: 20px; top: 120px; display: flex; flex-direction: column; gap: 25px; }
        .tool-btn { background: rgba(0,0,0,0.5); border: 1.5px solid #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* BOTTOM: THE GO LIVE COMMAND */
        .footer-panel { text-align: center; padding-bottom: 20px; }
        .lock-status { font-size: 13px; color: #aaa; margin-bottom: 15px; letter-spacing: 1px; }
        .btn-nawi-live { 
            width: 90px; height: 90px; border-radius: 50%; border: 5px solid #fff; 
            background: var(--red); color: white; font-weight: 900; font-size: 16px;
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.6); cursor: pointer; transition: 0.3s;
        }
        .btn-nawi-live:disabled { background: #222; border-color: #444; color: #666; box-shadow: none; cursor: not-allowed; }

        /* STICKER DRAWER */
        .sticker-row { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .sticker { width: 50px; height: 50px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <video id="cam-preview" autoplay playsinline muted></video>

    <div class="studio-ui">
        <div class="top-bar">
            <div class="stat-card">
                <div style="font-size:10px; color:var(--gold); font-weight:bold;">MONETIZATION PROGRESS</div>
                <div id="count-text" style="font-size:14px; margin-top:4px;">Checking...</div>
                <div class="progress-container"><div id="bar" class="progress-bar" style="width:0%"></div></div>
            </div>
            <div class="tool-btn" onclick="location.href='index.html'"><i class="fa-solid fa-xmark"></i></div>
        </div>

        <div class="side-tools">
            <div class="tool-btn" onclick="flip()"><i class="fa-solid fa-camera-rotate"></i></div>
            <div class="tool-btn"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            <div class="tool-btn"><i class="fa-solid fa-music"></i></div>
        </div>

        <div class="footer-panel">
            <div class="sticker-row">
                <div class="sticker"><i class="fa-solid fa-crown" style="color:gold"></i></div>
                <div class="sticker"><i class="fa-solid fa-gem" style="color:#00f2ff"></i></div>
                <div class="sticker"><i class="fa-solid fa-fire" style="color:#ffae00"></i></div>
            </div>

            <div id="lock-msg" class="lock-status">VERIFYING FOLLOWERS...</div>
            <button id="go-live-btn" class="btn-nawi-live" disabled onclick="triggerLive()">GO<br>LIVE</button>
        </div>
    </div>

    <script>
        // THIS IS THE REAL LOGIC - NO TEST NUMBERS
        async function startStudio() {
            try {
                // 1. Start Camera
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('cam-preview').srcObject = stream;

                // 2. Fetch Real Followers from MongoDB
                const response = await fetch('/api/user-stats'); // This links to your server.js
                const data = await response.json();
                const followers = data.followers || 0;

                // 3. Apply the 500-Follower Rule
                document.getElementById('count-text').innerText = followers + " / 500";
                let percent = (followers / 500) * 100;
                document.getElementById('bar').style.width = (percent > 100 ? 100 : percent) + "%";

                if (followers >= 500) {
                    document.getElementById('go-live-btn').disabled = false;
                    document.getElementById('lock-msg').innerText = "ACCESS GRANTED: BROADCAST READY";
                    document.getElementById('lock-msg').style.color = "#00ff88";
                } else {
                    document.getElementById('lock-msg').innerText = "LOCKED: " + (500 - followers) + " MORE TO GO LIVE";
                }
            } catch (e) { alert("Camera Error: Please allow access."); }
        }

        function triggerLive() {
            alert("NAWI BROADCAST STARTING...");
            // Real broadcast logic starts here
        }

        window.onload = startStudio;
    </script>
</body>
</html>
