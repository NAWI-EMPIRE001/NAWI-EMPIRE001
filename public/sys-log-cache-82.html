    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        
        :root {

        body {

            padding-bottom: 100px;
            overflow-x: hidden;

        .reserve-card {

            border-radius: 35px;

        .withdrawal-card {

            border: 1px solid var(--border);

            padding: 25px;

            border: 1px solid #222;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 15px;

        .input-group:focus-within { border-color: var(--gold); }

        .pin-grid { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; }
        .pin-btn {
            background: var(--glass); border: 1px solid #111; height: 50px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; transition: 0.2s;
        }
        .pin-btn:active { background: var(--gold); color: black; }

        #status-msg {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: black; padding: 10px 25px;
            border-radius: 50px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; display: none; z-index: 9999;

        .tab-content { display: none; }
        .tab-content.active { display: block; }

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function showMsg(text) {
            const bar = document.getElementById('status-msg');
            bar.innerText = text;
            bar.style.display = "block";
            setTimeout(() => { bar.style.display = "none"; }, 4000);
        }

        // 🛡️ INTEGRATED SECURE WITHDRAWAL FUNCTION
        function startWithdrawal() {
            const address = document.getElementById('binance-wallet-input').value;
            const amt = document.getElementById('withdrawAmount').value;
            
            if (address.length < 20 || !address.startsWith('0x')) {
                showMsg("❌ INVALID BINANCE BEP20 ADDRESS");
                return;
            }

            if(!amt || amt <= 0) {
                showMsg('❌ ENTER VALID AMOUNT');
                return;
            }
            
            showMsg('⚡ INITIALIZING SOVEREIGN HANDSHAKE...');
            
            // This is where your backend API link goes
            setTimeout(() => {
                console.log(`LOG: Initiating ${amt} USD to ${address}`);
                showMsg(`✅ SYNCED: ${amt} USD QUEUED FOR BINANCE`);
                
                // Clear fields after success
                document.getElementById('binance-wallet-input').value = "";
                document.getElementById('withdrawAmount').value = "";
            }, 3000);
        }

        function triggerLockdown() {
            const pin = prompt("CONFIRM MASTER PIN:");
            if (pin === "7777") {
                showMsg("⚠️ EMPIRE SECURED. ALL NODES LOCKED.");

            }
        }
