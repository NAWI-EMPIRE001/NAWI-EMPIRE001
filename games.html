<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | Pro Gaming Arena</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --neon-blue: #00d4ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--gold); letter-spacing: 3px; margin: 0; font-size: 26px; }
        .header p { color: #888; font-size: 14px; }

        /* Wallet Balance */
        .wallet-bar { background: #111; padding: 10px 20px; border-radius: 30px; border: 1px solid #333; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .wallet-bar span { color: var(--gold); font-weight: bold; }

        /* Game Categories */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: #111; border: 1px solid #222; border-radius: 15px; overflow: hidden; position: relative; transition: 0.3s; }
        .game-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .game-thumb { height: 100px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .game-details { padding: 12px; text-align: left; }
        .game-title { font-weight: bold; font-size: 14px; display: block; }
        .game-meta { font-size: 11px; color: #888; margin-top: 5px; }

        .entry-fee { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding: 4px 8px; border-radius: 5px; font-size: 10px; float: right; font-weight: bold; border: 1px solid var(--gold); }

        /* Join Button */
        .btn-join { background: var(--gold); color: #000; border: none; width: 100%; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 0 0 15px 15px; }

        .back-link { display: block; text-align: center; margin-top: 40px; color: #555; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 GAMING ARENA</h1>
        <p>7 PILLARS PRO TOURNAMENTS</p>
        <div class="wallet-bar">
            <i class="fa-solid fa-wallet"></i> Balance: <span>1,500 Coins 🪙</span>
        </div>
    </div>

    <div class="game-grid">
        <div class="game-card">
            <div class="game-thumb">⚽</div>
            <div class="game-details">
                <span class="entry-fee">10 Coins</span>
                <span class="game-title">eFootball 2026</span>
                <span class="game-meta">12 Players Active</span>
            </div>
            <button class="btn-join" onclick="joinArena('eFootball')">JOIN TOURNAMENT</button>
        </div>

        <div class="game-card">
            <div class="game-thumb">🔥</div>
            <div class="game-details">
                <span class="entry-fee">15 Coins</span>
                <span class="game-title">Free Fire Max</span>
                <span class="game-meta">Squad Rush</span>
            </div>
            <button class="btn-join" onclick="joinArena('Free Fire')">JOIN SQUAD</button>
        </div>

        <div class="game-card">
            <div class="game-thumb">🪂</div>
            <div class="game-details">
                <span class="entry-fee">20 Coins</span>
                <span class="game-title">PUBG Mobile</span>
                <span class="game-meta">Battle Royale</span>
            </div>
            <button class="btn-join" onclick="joinArena('PUBG')">ENTER ARENA</button>
        </div>

        <div class="game-card">
            <div class="game-thumb">🔫</div>
            <div class="game-details">
                <span class="entry-fee">25 Coins</span>
                <span class="game-title">COD Mobile</span>
                <span class="game-meta">5v5 Ranked</span>
            </div>
            <button class="btn-join" onclick="joinArena('COD')">START MATCH</button>
        </div>
    </div>

    <a href="app-grid.html" class="back-link">← Exit Gaming Studio</a>

    <script>
        function joinArena(game) {
            alert("Entry Request Sent to Founder! \nPreparing your " + game + " slot in the Empire...");
            // This is where you connect to your P2P system to handle entry fees
        }
    </script>
</body>
</html>
