<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | Discover</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --dark-grey: #1a1a1a; --search-bg: #262626; }
        
        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; }

        /* SEARCH BAR AREA */
        .search-section { padding: 40px 15px 15px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        .search-box { background: var(--search-bg); border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .search-box i { color: #8e8e8e; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 16px; }

        /* SECTION TITLES */
        .section-title { padding: 20px 15px 10px; color: var(--gold); font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* TRENDING BRANDS/USERS ROW */
        .trend-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #111; transition: 0.3s; }
        .trend-item:hover { background: #050505; }
        
        .profile-info { display: flex; align-items: center; gap: 12px; }
        .trend-avatar { width: 45px; height: 45px; background: #333; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .name-stack { display: flex; flex-direction: column; }
        .username { font-weight: bold; font-size: 15px; }
        .subtitle { font-size: 12px; color: #888; }

        /* ACTION BUTTON */
        .view-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .view-btn:hover { background: var(--gold); color: black; }

        /* BACK NAVIGATION */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="search-section">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search the 7 Pillars..." onkeyup="searchEmpire(this.value)">
        </div>
    </div>

    <div class="section-title">Trending in the Empire</div>

    <div class="trend-item">
        <div class="profile-info">
            <div class="trend-avatar">7P</div>
            <div class="name-stack">
                <span class="username">7 Pillars Official</span>
                <span class="subtitle">Platform Headquarters</span>
            </div>
        </div>
        <button class="view-btn" onclick="location.href='content.html'">VIEW</button>
    </div>

    <div class="trend-item">
        <div class="profile-info">
            <div class="trend-avatar" style="background: #D4AF37; color: black;">VJ</div>
            <div class="name-stack">
                <span class="username">Victor Johnson</span>
                <span class="subtitle">Design Studio Lead</span>
            </div>
        </div>
        <button class="view-btn" onclick="location.href='design.html'">VIEW</button>
    </div>

    <div class="trend-item">
        <div class="profile-info">
            <div class="trend-avatar">🛒</div>
            <div class="name-stack">
                <span class="username">Premium Marketplace</span>
                <span class="subtitle">Top Verified Ads</span>
            </div>
        </div>
        <button class="view-btn" onclick="location.href='market.html'">SHOP</button>
    </div>

    <a href="app-grid.html" class="back-nav">← Back to Headquarters</a>

    <script>
        function searchEmpire(query) {
            console.log("Searching for: " + query);
            // This is where you would connect to your MongoDB to find users/products
        }
    </script>

</body>
</html>
