name: Apply Hardening (create branch + PR)

on:
  workflow_dispatch:
    inputs:
      npm-install:
        description: 'Set to "true" to skip npm install in CI (default: false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-hardening:
    runs-on: ubuntu-latest
    env:
      BRANCH: security/hardening-core
      NPM_INSTALL: ${{ github.event.inputs.skip-npm-install }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure Git Identity & Remote
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Write run-harden.sh
        run: |
          cat > run-harden.sh <<'SCRIPT'
#!/usr/bin/env bash
set -euo pipefail

BRANCH="security/hardening-core"

# Validate work tree structure context
if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  echo "ERROR: This script must be run from the root of your git repository."
  exit 1
fi

# Fetch newest remote changes safely
git fetch origin

# Track and resolve remote branch conflicts cleanly to avoid overwrite breaks
if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
  echo "Target track detected on remote. Syncing and checkout optimization active..."
  git checkout -B "${BRANCH}" "origin/${BRANCH}"
else
  echo "Creating fresh isolated engineering track ${BRANCH}..."
  git checkout -B "${BRANCH}"
fi

# Write Optimized Production-Grade package.json targeting NAWI-EMPIRE001 core
cat > package.json <<'PACKAGE_JSON'
{
  "name": "nawi-empire001-core-engine",
  "version": "1.0.0",
  "description": "NAWI-EMPIRE001 Unified Sovereign Production Platform Engine",
  "main": "server.js",
  "private": true,
  "license": "UNLICENSED",
  "type": "commonjs",
  "author": "NAWI-EMPIRE001 Architect",
  "engines": {
    "node": ">=18.18.0",
    "npm": ">=9.0.0"
  },
  "scripts": {
    "start": "node server.js",
    "dev": "nodemon server.js",
    "production": "NODE_ENV=production node server.js",
    "render-build": "npm install"
  },
  "dependencies": {
    "axios": "^1.7.2",
    "bcryptjs": "^2.4.3",
    "cloudinary": "^2.1.0",
    "compression": "^1.7.4",
    "cors": "^2.8.5",
    "dotenv": "^16.4.5",
    "express": "^4.19.2",
    "express-rate-limit": "^7.3.1",
    "express-validator": "^6.14.3",
    "fluent-ffmpeg": "^2.1.2",
    "helmet": "^7.1.0",
    "jsonwebtoken": "^9.0.2",
    "mongodb": "^6.8.0",
    "mongoose": "^8.5.1",
    "morgan": "^1.10.0",
    "multer": "^1.4.5-lts.1",
    "sharp": "^0.33.4",
    "socket.io": "^4.7.5",
    "socket.io-client": "^4.7.5",
    "stripe": "^15.12.0",
    "uuid": "^10.0.0"
  },
  "devDependencies": {
    "nodemon": "^3.1.4"
  },
  "repository": {
    "type": "git",
    "url": "https://github.com/NAWI-EMPIRE001/NAWI-EMPIRE001-.git"
  },
  "bugs": {
    "url": "https://github.com/NAWI-EMPIRE001/NAWI-EMPIRE001-/issues"
  },
  "homepage": "https://nawi-empire1.onrender.com"
}
PACKAGE_JSON

echo "Structural package.json written successfully."

# Initialize controllers context architecture
mkdir -p controllers

cat > controllers/authController.js <<'AUTH'
const mongoose = require('mongoose');
const bcrypt = require('bcryptjs');
const jwt = require('jsonwebtoken');
const JWT_SECRET = process.env.JWT_SECRET || 'NAWI_EMPIRE_SECRET';

// Safe model retrieval fallback sequence to prevent schema registration timing conflicts
const getUserModel = () => {
  try {
    return mongoose.model('User');
  } catch (e) {
    // Dynamic schema allocation check if loading order drops
    const UserSchema = new mongoose.Schema({}, { strict: false });
    return mongoose.model('User', UserSchema);
  }
};

module.exports = {
  registerUser: async (req, res) => {
    try {
      const { username, email, password, phone_number } = req.body;
      const UserModel = getUserModel();
      const existingUser = await UserModel.findOne({ $or: [{ email }, { username }] });
      if (existingUser) return res.status(400).json({ success: false, message: 'User structural node already exists.' });
      const hashedPassword = await bcrypt.hash(password, 12);
      const user = await UserModel.create({ username, email, password: hashedPassword, phone_number });
      const token = jwt.sign({ userId: user._id, email: user.email }, JWT_SECRET, { expiresIn: '7d' });
      return res.status(201).json({ success: true, token, user });
    } catch (error) {
      return res.status(500).json({ success: false, message: error.message });
    }
  },

  handleUserSession: async (req, res) => {
    try {
      const { email, password } = req.body;
      const UserModel = getUserModel();
      const user = await UserModel.findOne({ email });
      if (!user) return res.status(401).json({ success: false, message: 'Invalid validation credentials.' });
      const validPassword = await bcrypt.compare(password, user.password);
      if (!validPassword) return res.status(401).json({ success: false, message: 'Invalid validation credentials.' });
      const token = jwt.sign({ userId: user._id, email: user.email }, JWT_SECRET, { expiresIn: '7d' });
      return res.status(200).json({ success: true, token, user });
    } catch (error) {
      return res.status(500).json({ success: false, message: error.message });
    }
  }
};
AUTH

cat > controllers/battleController.js <<'BATTLE'
module.exports = {
  initializeMatch: async (req, res) => {
    return res.status(200).json({ status: "ACTIVE", message: "Arena Node Battle Core Engine standing by." });
  }
};
BATTLE

cat > controllers/borderControl.js <<'BORDER'
module.exports = {
  verifyPassport: async (req, res) => {
    return res.status(200).json({ status: "AUTHORIZED", message: "Sovereign gate security synchronization verified." });
  }
};
BORDER

cat > controllers/masterPayout.js <<'PAYOUT'
module.exports = {
  processPayout: async (req, res) => {
    return res.status(200).json({ status: "STABLE", message: "Sovereign liquidity distribution pipeline clear." });
  }
