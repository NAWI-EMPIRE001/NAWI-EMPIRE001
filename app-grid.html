<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE | Official Sovereign Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .imperial-font { font-family: 'Syncopate', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gold-glow { box-shadow: 0 0 30px rgba(245, 158, 11, 0.15); }

        /* UPGRADED 7 PILLARS GRID STYLES */
        .pillar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 5px;
            width: 100%;
        }

        .pillar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 22px 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-align: center;
        }

        .pillar-item:active {
            border-color: #f59e0b;
            transform: scale(0.92);
            background: #111;
        }

        .pillar-item i {
            font-size: 24px;
            color: #f59e0b; /* Golden Amber */
            margin-bottom: 10px;
        }

        .pillar-item span {
            color: #888;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Highlight for the primary Ads Tool */
        .promo-pillar {
            border-color: rgba(245, 158, 11, 0.3);
            background: linear-gradient(145deg, #0a0a0a, #1a150a);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-32">

    <header class="w-full max-w-md p-6 pt-10 flex justify-between items-center">
        <div>
            <h1 class="imperial-font text-xl tracking-tighter italic font-bold">NAWI EMPIRE</h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                <p class="text-[7px] font-black text-amber-500 uppercase tracking-[0.4em]">Node Active: 001</p>
            </div>
        </div>
        <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center gold-glow">
            <i data-lucide="shield-check" class="text-amber-500 w-6 h-6"></i>
        </div>
    </header>

    <main class="w-full max-w-md px-6 space-y-6">
        <div class="glass rounded-[3rem] p-8 relative overflow-hidden gold-glow border-amber-500/20">
            <div class="relative z-10">
                <p class="text-[8px] font-black text-zinc-500 uppercase tracking-widest mb-2">Central Coin Reserve 🪙</p>
                <h2 id="balance-display" class="text-5xl font-black italic tracking-tighter mb-8">0</h2>
                <div class="flex gap-3">
                    <button class="flex-1 bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95">Acquire</button>
                    <button class="flex-1 glass py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95">Stake 0%</button>
                </div>
            </div>
            <i data-lucide="coins" class="absolute -bottom-10 -right-10 w-40 h-40 text-white opacity-5 rotate-12"></i>
        </div>

        <div class="space-y-4">
            <div class="flex items-center gap-2 px-2">
                <i data-lucide="layout-grid" class="w-3 h-3 text-amber-500"></i>
                <h3 class="text-[8px] font-black uppercase tracking-widest text-zinc-500">Empire Systems</h3>
            </div>
            
            <div class="pillar-grid">
                <div class="pillar-item" onclick="window.location.href='market.html'">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>Market</span>
                </div>

                <div class="pillar-item" onclick="window.location.href='studio.html'">
                    <i class="fa-solid fa-pen-nib"></i>
                    <span>Studio</span>
                </div>

                <div class="pillar-item promo-pillar" onclick="window.location.href='ads.html'">
                    <i class="fa-solid fa-rectangle-ad"></i>
                    <span>Ads Manager</span>
                </div>

                <div class="pillar-item" onclick="window.location.href='kitchen.html'">
                    <i class="fa-solid fa-utensils"></i>
                    <span>Kitchen</span>
                </div>

                <div class="pillar-item" onclick="window.location.href='games.html'">
                    <i class="fa-solid fa-gamepad"></i>
                    <span>Games</span>
                </div>

                <div class="pillar-item" onclick="window.location.href='music.html'">
                    <i class="fa-solid fa-music"></i>
                    <span>Music</span>
                </div>

                <div class="pillar-item" onclick="window.location.href='stickers.html'">
                    <i class="fa-solid fa-face-smile"></i>
                    <span>Stickers</span>
                </div>
            </div>
        </div>

        <div class="glass rounded-[2rem] p-6 flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center">
                <i data-lucide="user-check" class="text-blue-500 w-5 h-5"></i>
            </div>
            <div>
                <p class="text-[7px] font-black text-zinc-500 uppercase">Verified Founder</p>
                <p class="text-[10px] font-black uppercase italic">akpanvictor848@gmail.com</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 w-[90%] max-w-xs glass p-2 rounded-[2.5rem] flex gap-2 shadow-2xl z-50">
        <button class="flex-1 py-5 flex justify-center text-white bg-white/10 rounded-[2rem] shadow-inner"><i data-lucide="home"></i></button>
        <button onclick="window.location.href='content.html'" class="flex-1 py-5 flex justify-center text-zinc-600"><i data-lucide="book-open"></i></button>
        <button onclick="window.location.href='design.html'" class="flex-1 py-5 flex justify-center text-zinc-600"><i data-lucide="palette"></i></button>
        <button onclick="logout()" class="flex-1 py-5 flex justify-center text-zinc-600"><i data-lucide="log-out"></i></button>
    </nav>

    <script>
        lucide.createIcons();
        
        window.onload = () => {
            const auth = localStorage.getItem('nawi_token');
            if (!auth) {
                window.location.href = 'index.html';
            }
            document.getElementById('balance-display').innerText = "0";
        };

        function logout() {
            localStorage.removeItem('nawi_token');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
