<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7 Pillars | CONTENT CREATION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #000; --glass: rgba(255, 255, 255, 0.08); }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        /* CONTENT FEED SCROLL AREA */
        .content-container { height: 100vh; overflow-y: auto; padding: 20px 15px 100px 15px; box-sizing: border-box; }

        /* THE BRAND POSTING BOX */
        .post-creator { background: #111; border-radius: 15px; padding: 15px; border: 1px solid #222; display: flex; gap: 12px; align-items: center; margin-bottom: 25px; }
        .post-box-input { background: #1a1a1a; border: none; border-radius: 20px; padding: 12px 18px; color: white; flex: 1; font-size: 14px; outline: none; }
        .media-trigger { color: var(--gold); font-size: 20px; cursor: pointer; }

        /* POSTS */
        .feed-post { background: var(--glass); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .profile-side { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 45px; height: 45px; background: #333; border-radius: 50%; border: 1.5px solid var(--gold); }
        .user-name { font-weight: bold; font-size: 15px; }
        .badge { color: var(--gold); font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; }
        
        .follow-back-btn { background: var(--gold); color: black; border: none; padding: 8px 18px; border-radius: 25px; font-weight: 800; font-size: 12px; cursor: pointer; }

        /* EARN CHIP */
        .earn-chip { background: rgba(212, 175, 55, 0.15); color: var(--gold); padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; border: 1px solid var(--gold); margin-bottom: 10px; display: inline-block; }

        .engagement-row { display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 12px; margin-top: 10px; }
        .eng-btn { color: #999; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 7px; }
        
        .back-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 30px; border-radius: 30px; font-weight: bold; text-decoration: none; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="content-container" id="feed">
        <h2 style="color:var(--gold); font-size: 18px; text-align:center; margin-bottom:20px; letter-spacing:1px;">CONTENT PILLAR</h2>

        <div class="post-creator">
            <input type="text" id="postContent" class="post-box-input" placeholder="Post to the Empire...">
            <div class="media-trigger" onclick="publishPost()"><i class="fa-solid fa-paper-plane"></i></div>
        </div>

        <div class="feed-post">
            <div class="earn-chip">EARN +1 COIN 🪙 FOR READING</div>
            <div class="user-header">
                <div class="profile-side">
                    <div class="user-avatar"></div>
                    <div>
                        <span class="user-name">NAWI-EMPIRE OFFICIAL</span>
                        <span class="badge">Verified Pillar</span>
                    </div>
                </div>
                <button class="follow-back-btn" onclick="followAction(this)">Follow</button>
            </div>
            <div class="post-body">Welcome to the Content Pillar. Professional creators post their portfolio here to attract buyers from the Marketplace.</div>
            <div class="engagement-row">
                <div class="eng-btn"><i class="fa-regular fa-heart"></i> 1.5k</div>
                <div class="eng-btn"><i class="fa-solid fa-share-nodes"></i> Share</div>
            </div>
        </div>
    </div>

    <a href="app-grid.html" class="back-nav">← Back to HQ</a>

    <script>
        // Connects to your combined node.js server
        async function publishPost() {
            const content = document.getElementById('postContent').value;
            if(!content) return;

            const response = await fetch('/api/posts/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: content })
            });

            if(response.ok) {
                alert("Post Secured in Cluster!");
                location.reload();
            }
        }

        function followAction(btn) {
            btn.innerText = "Following";
            btn.style.background = "#222";
            btn.style.color = "#D4AF37";
        }
    </script>
</body>
</html>
