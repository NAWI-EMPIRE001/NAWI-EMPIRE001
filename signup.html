<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI EMPIRE | VERIFICATION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #000; --dark: #111; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .signup-box { background: var(--dark); border: 1px solid var(--gold); padding: 40px; border-radius: 25px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        .logo { color: var(--gold); font-weight: 900; letter-spacing: 3px; margin-bottom: 5px; font-size: 22px; }
        .sub-text { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: #222; }
        
        .action-btn { background: var(--gold); color: black; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .action-btn:hover { transform: scale(0.98); opacity: 0.9; }

        .footer-link { margin-top: 25px; font-size: 12px; color: #555; }
        .footer-link a { color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="signup-box">
        <div class="logo">NAWI EMPIRE</div>
        <div class="sub-text">Founder Verification Portal</div>
        
        <form id="signupForm">
            <input type="text" id="username" placeholder="Empire Username (e.g. 001)" required>
            <input type="email" id="email" value="akpanvictor848@gmail.com" required>
            <input type="password" id="password" value="$Nsikak111" required>
            
            <button type="submit" class="action-btn">Verify & Activate</button>
        </form>

        <div class="footer-link">
            Already authorized? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: "FOUNDER" // Identifying your special status
            };

            // This MUST point to your master server path
            try {
                const response = await fetch('/api/posts/create', { // Temporarily using create to log the founder entry
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        author: userData.username,
                        content: "Founder Identity Activated: " + userData.email,
                        type: "official_log"
                    })
                });

                if (response.ok) {
                    alert("EMPIRE ACTIVATED: Welcome Founder.");
                    localStorage.setItem('nawi_token', 'FOUNDER_VERIFIED');
                    window.location.href = 'app-grid.html';
                } else {
                    alert("Connection failed. Ensure Render is LIVE.");
                }
            } catch (err) {
                alert("Empire System Offline. Check GitHub for errors.");
            }
        };
    </script>
</body>
</html>
