<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --white: #ffffff; --dark: #000000; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* TOP NAVIGATION */
        .top-nav { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .nav-tabs { display: flex; gap: 25px; font-weight: bold; font-size: 17px; }
        .nav-tabs span { color: rgba(255,255,255,0.6); cursor: pointer; }
        .nav-tabs .active { color: white; border-bottom: 2px solid white; padding-bottom: 5px; }

        /* MAIN FEED */
        .main-feed { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-post { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; }

        /* SIDE ACTIONS - Exact placement from screenshots */
        .side-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .action-item { text-align: center; }
        .action-item i { font-size: 32px; display: block; margin-bottom: 4px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .action-item span { font-size: 12px; font-weight: bold; }

        /* CAPTION AREA - HIDDEN IDENTITY */
        .post-caption { position: absolute; left: 15px; bottom: 95px; max-width: 75%; z-index: 10; }
        .post-caption h4 { margin: 0 0 8px 0; font-size: 16px; color: var(--gold); }
        .post-caption p { margin: 0; font-size: 14px; color: #fff; }

        /* BOTTOM NAVIGATION - 5 Pillars Order */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; z-index: 1000; }
        .nav-item { color: #888; font-size: 10px; text-align: center; text-decoration: none; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }
        
        /* THE PLUS BUTTON (+) */
        .plus-button { width: 45px; height: 32px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: black; position: relative; cursor: pointer; }
        .plus-button::before { content: ''; position: absolute; left: -5px; width: 10px; height: 100%; background: #69C9D0; border-radius: 4px; z-index: -1; }
        .plus-button::after { content: ''; position: absolute; right: -5px; width: 10px; height: 100%; background: #EE1D52; border-radius: 4px; z-index: -1; }

        /* OVERLAYS */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-tabs">
            <span>Explore</span>
            <span class="active">For You</span>
        </div>
    </div>

    <div class="main-feed">
        <div class="video-post">
            <div class="side-actions">
                <div class="action-item"><i class="fa-solid fa-heart"></i><span>0</span></div>
                <div class="action-item"><i class="fa-solid fa-comment-dots"></i><span>0</span></div>
                <div class="action-item"><i class="fa-solid fa-bookmark"></i><span>0</span></div>
                <div class="action-item"><i class="fa-solid fa-share"></i><span>0</span></div>
            </div>
            <div class="post-caption">
                <h4>@Founder</h4>
                <p>Welcome to the platform. Follow the rules to protect the Empire. This is our order. [cite: 2026-03-05]</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="discover.html" class="nav-item"><i class="fa-solid fa-compass"></i>Discover</a>
        <div class="plus-button" onclick="openStudio()"><i class="fa-solid fa-plus"></i></div>
        <a href="inbox.html" class="nav-item"><i class="fa-solid fa-comment-dots"></i>Inbox</a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i>Profile</a>
    </div>

    <div id="overlay">
        <div onclick="closeStudio()" style="position:absolute; top:40px; right:30px; font-size:35px;">&times;</div>
        <h2 style="color:var(--gold)">NAWI STUDIO</h2>
        <div style="display:flex; gap:20px; margin-top:50px;">
            <a href="live.html" style="color:white; text-decoration:none; text-align:center;"><i class="fa-solid fa-tower-broadcast" style="font-size:40px; display:block;"></i>LIVE</a>
            <a href="post.html" style="color:white; text-decoration:none; text-align:center;"><i class="fa-solid fa-plus-square" style="font-size:40px; display:block;"></i>POST</a>
        </div>
    </div>

    <script>
        function openStudio() { document.getElementById('overlay').style.display = 'flex'; }
        function closeStudio() { document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
