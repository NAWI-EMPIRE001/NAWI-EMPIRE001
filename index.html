<7 pillars html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI EMPIRE | LIVE NODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #010101; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-text { color: #f59e0b; font-weight: 900; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <div id="dashboard">
        <h1 class="text-xs tracking-[5px] text-zinc-500 mb-2 uppercase">Sovereign Reserve Asset</h1>
        <h2 id="display-reserve" class="text-6xl font-black italic gold-text mb-8">25.0M</h2>
        
        <div class="glass p-6 mb-10">
            <p class="text-[10px] uppercase text-zinc-400 mb-1">Executive Authority</p>
            <p class="text-sm font-bold italic text-white">H.E. NSIKAK AKPAN WARRI <span class="text-emerald-500 text-[8px] ml-2 font-black border border-emerald-500 px-2 rounded">VERIFIED</span></p>
        </div>

        <button onclick="showAdmin()" class="text-[8px] text-zinc-800 uppercase tracking-widest">System Access</button>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/90 flex items-center justify-center p-6 hidden">
        <div class="glass p-8 w-full max-w-sm text-center border-amber-600/50">
            <h3 class="gold-text uppercase tracking-widest mb-6">Imperial Command</h3>
            <input type="number" id="new-amount" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-center text-xl font-bold" placeholder="35000000">
            <button onclick="updateLedger()" class="w-full bg-amber-600 text-black font-black p-4 rounded-xl uppercase tracking-widest mb-4 active:scale-95 transition-all">Update Ledger</button>
            <button onclick="hideAdmin()" class="text-[8px] text-zinc-500 uppercase">Exit System</button>
        </div>
    </div>

    <script>
        // 1. Load the saved amount when the page opens
        window.onload = function() {
            const savedAmount = localStorage.getItem('nawi_reserve');
            if (savedAmount) {
                // Formats the number (e.g., 35000000 to 35.0M)
                document.getElementById('display-reserve').innerText = (savedAmount / 1000000).toFixed(1) + "M";
            }
        };

        function showAdmin() {
            let pass = prompt("Enter Authority Key:");
            if(pass === "NAWI-ALPHA-01") {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }

        function hideAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
        }

        // 2. THE FIX: This makes the button save the data!
        function updateLedger() {
            const val = document.getElementById('new-amount').value;
            if (val) {
                // Saves to your phone's memory
                localStorage.setItem('nawi_reserve', val);
                // Updates the screen
                document.getElementById('display-reserve').innerText = (val / 1000000).toFixed(1) + "M";
                alert("Vault Updated, Excellency.");
                hideAdmin();
            } else {
                alert("Enter an amount.");
            }
        }
    </script>
</body>
</html>
