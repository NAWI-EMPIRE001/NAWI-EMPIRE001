<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI EMPIRE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* The Secret Entrance - Invisible to everyone but you */
        #ghost-trigger {
            position: fixed;
            top: 0;
            right: 0;
            width: 50px;
            height: 50px;
            z-index: 9999;
            background: transparent;
        }
        .pillar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }
        .pillar-btn {
            padding: 20px;
            border-radius: 12px;
            border: none;
            background: #1a1a1a;
            color: gold;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body style="background: #000; color: #fff; font-family: sans-serif;">

    <div id="ghost-trigger" onclick="ghostCheck()"></div>

    <header style="text-align: center; padding: 20px;">
        <h1 style="color: gold; letter-spacing: 2px;">NAWI EMPIRE</h1>
        <p id="status-text">Welcome to the 7 Pillars</p>
        <div id="admin-panel" style="display:none; border: 1px solid gold; padding: 10px; margin-top: 10px;">
            <h3>CONTROL ROOM</h3>
            <p>Vault Reserve: <span id="vault-amount" style="color:lime"></span> pts</p>
        </div>
    </header>

    <main class="pillar-grid">
        <button class="pillar-btn" onclick="location.href='ads.html'">📺 Ads Manager</button>
        <button class="pillar-btn" onclick="location.href='live.html'">🎥 Live Stream</button>
        <button class="pillar-btn" onclick="location.href='games.html'">🎮 Gaming Studio</button>
        <button class="pillar-btn" onclick="location.href='market.html'">🛍️ Marketplace</button>
        <button class="pillar-btn" onclick="location.href='kitchen.html'">🍳 Kitchen</button>
        <button class="pillar-btn" onclick="location.href='music.html'">🎵 Music Promo</button>
        <button class="pillar-btn" onclick="location.href='design.html'" style="grid-column: span 2;">🎨 Creative Studio</button>
    </main>

    <script>
        let clickCount = 0;
        function ghostCheck() {
            clickCount++;
            if (clickCount === 5) { // Secret: Only 5 taps unlocks the prompt
                let pin = prompt("Enter Secret Key:");
                verifyExcellency(pin);
                clickCount = 0;
            }
        }

        function verifyExcellency(pin) {
            // This calls your server to check the MongoDB secret_key
            fetch('/api/admin-auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pin: pin })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('vault-amount').innerText = data.vault.toLocaleString();
                    document.getElementById('status-text').innerText = "Logged in as Ghost CEO";
                } else {
                    alert("Unauthorized Access Attempt Recorded.");
                }
            });
        }
    </script>
</body>
</html>
