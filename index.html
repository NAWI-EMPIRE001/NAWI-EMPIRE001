<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="NAWI EMPIRE: A Global Sovereign Home for P2P Trade and Secure Founding.">
    <title>NAWI EMPIRE | GLOBAL HOME</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --glass: rgba(255, 255, 255, 0.05); --black: #080808; --green: #00ff64; }
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* --- Auth Gate --- */
        #auth-gate { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #111 0%, #000 100%); padding: 20px; text-align: center; z-index: 3000; position: fixed; width: 100%; top: 0; transition: 0.8s; }
        .authority-card { background: rgba(255,255,255,0.03); border: 1px solid var(--gold); border-radius: 24px; padding: 40px 30px; max-width: 400px; width: 100%; backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(212, 175, 55, 0.1); }
        .order-text { font-size: 13px; line-height: 1.8; margin-bottom: 30px; color: #eee; border-left: 3px solid var(--gold); padding-left: 15px; text-align: left; font-style: italic; }
        .gate-btn { background: var(--gold); color: black; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        #main-platform { display: none; padding-bottom: 100px; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* --- Search --- */
        .top-search-container { padding: 25px 15px 15px; background: #000; position: sticky; top: 0; z-index: 1000; }
        .search-wrapper { background: var(--glass); border: 1px solid #222; border-radius: 15px; display: flex; align-items: center; padding: 14px 18px; }
        .search-wrapper input { background: none; border: none; color: white; width: 100%; font-size: 14px; outline: none; margin-left: 10px; }

        /* --- Sections --- */
        .view-section { display: none; padding: 15px; }
        .active-view { display: block; }

        /* --- Cards --- */
        .product-card { background: #111; border: 1px solid #222; border-radius: 22px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .global-badge { color: var(--green); font-size: 9px; font-weight: 900; letter-spacing: 1px; }
        .escrow-shield { color: var(--gold); font-size: 10px; font-weight: 900; }
        .product-card h3 { color: #fff; margin: 0; font-size: 17px; text-transform: uppercase; }
        .price-tag { font-size: 22px; font-weight: 900; color: var(--gold); display: block; margin-top: 10px; }
        .buy-btn { background: var(--gold); color: black; width: 100%; border: none; padding: 15px; margin-top: 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* --- Navigation --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 18px 0 25px; border-top: 1px solid #111; z-index: 2000; }
        .nav-btn { text-align: center; text-decoration: none; color: #444; flex: 1; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn p { font-size: 9px; margin-top: 5px; font-weight: 900; text-transform: uppercase; }
        .plus-btn { background: var(--gold); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -15px; color: black; font-size: 22px; cursor: pointer; border: 4px solid #000; }

        /* --- CEO Tools (Hidden by default) --- */
        #ceo-controls { display: none; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="authority-card">
            <div style="color:var(--gold); font-weight:900; font-size:10px; margin-bottom:20px; letter-spacing:4px;">EMPIRE MANDATE</div>
            <p class="order-text">"This is my order and my authority to protect the founders and this platform... follow the rules of this platform."</p>
            <button class="gate-btn" onclick="bypassGate()">Unlock Ecosystem</button>
        </div>
    </div>

    <div id="main-platform">
        <div class="top-search-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="global-search" placeholder="Discover anything in the world...">
            </div>
        </div>

        <div id="home-view" class="view-section active-view">
            <div style="padding: 20px; text-align: center; border: 1px dashed #333; border-radius: 15px; margin-bottom: 20px;">
                <h4 style="color: var(--gold); margin: 0;">GLOBAL BROADCAST</h4>
                <p style="font-size: 11px; color: #777;">System stable. Welcome to the Empire Home.</p>
            </div>
            <div id="home-feed"></div>
        </div>

        <div id="market-view" class="view-section">
            <h2 style="font-size: 12px; letter-spacing: 2px; color: #555; text-align: center; margin-bottom: 20px;">EXCLUSIVE ASSETS</h2>
            <div id="market-grid"></div>
        </div>

        <div id="ceo-view" class="view-section">
            <div id="ceo-controls">
                <h2 style="color:var(--gold); text-align:center;">MASTER COMMAND CENTER</h2>
                <div style="background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--gold);">
                    <p style="font-size: 12px; text-align: center;">FOUNDER IDENTITY: VERIFIED</p>
                    <button class="buy-btn" onclick="window.location.href='add-product.html'">DEPLOY NEW ASSET</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-btn active" onclick="showSection('home')"><i class="fa-solid fa-house"></i><p>Home</p></div>
            <div class="nav-btn" onclick="showSection('market')"><i class="fa-solid fa-shop"></i><p>Market</p></div>
            <div class="plus-btn" onclick="alert('Quick Action Menu: Add Asset Enabled.')"><i class="fa-solid fa-plus"></i></div>
            <div class="nav-btn" onclick="showSection('inbox')"><i class="fa-solid fa-message"></i><p>Inbox</p></div>
            <div class="nav-btn" onclick="showSection('ceo')"><i class="fa-solid fa-user-shield"></i><p>CEO</p></div>
        </nav>
    </div>

    <script>
        const API_URL = "https://nawi-empire1.onrender.com";
        let allProducts = [];

        // 👑 FOUNDER AUTHENTICATION CHECK
        function verifyEmpireAuthority() {
            const token = localStorage.getItem('token'); // Checks for your login token
            const ceoSection = document.getElementById('ceo-controls');
            
            if (token === 'FOUNDER_001') {
                if(ceoSection) ceoSection.style.display = 'block';
                console.log("🏰 Authority Confirmed: Master Command Active.");
            } else {
                if(ceoSection) ceoSection.style.display = 'none';
            }
        }

        // 🗺️ NAVIGATION REARRANGEMENT
        function showSection(target) {
            const sections = ['home', 'market', 'inbox', 'ceo'];
            sections.forEach(s => {
                const el = document.getElementById(`${s}-view`);
                if(el) el.classList.remove('active-view');
                
                // Update nav icon color
                const btns = document.querySelectorAll('.nav-btn');
                btns.forEach(b => b.classList.remove('active'));
            });
            
            const activeEl = document.getElementById(`${target}-view`);
            if(activeEl) activeEl.classList.add('active-view');
            event.currentTarget.classList.add('active');
        }

        // 🛡️ P2P GATEWAY LOGIC
        function openMarketplaceMenu(productId) {
            console.log("Initiating Gateway for Asset:", productId);
            alert("P2P Gateway Initiated... Connecting to Escrow.");
            // Logic for trade redirection can go here
        }

        function bypassGate() {
            document.getElementById('auth-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('main-platform').style.display = 'block';
                loadVaultData(); 
            }, 800);
        }

        async function loadVaultData() {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '<p style="text-align:center; color:var(--gold);">SYNCING VAULT...</p>';
            try {
                const response = await fetch(`${API_URL}/api/get-products`);
                allProducts = await response.json();
                renderUI(allProducts);
            } catch (err) {
                grid.innerHTML = '<p style="text-align:center; color:red;">SYNC INTERRUPTED</p>';
            }
        }

        function renderUI(items) {
            const grid = document.getElementById('market-grid');
            const feed = document.getElementById('home-feed');
            grid.innerHTML = '';
            feed.innerHTML = '';

            items.forEach(item => {
                const card = `
                    <div class="product-card">
                        <div class="card-meta">
                            <span class="global-badge">🌍 GLOBAL ACTIVE</span>
                            <span class="escrow-shield">🛡️ ESCROW ACTIVE</span>
                        </div>
                        <h3>${item.product_name}</h3>
                        <p style="font-size:12px; color:#888;">${item.category || 'Asset'} | SOVEREIGN GRADE</p>
                        <span class="price-tag">$${parseFloat(item.price).toFixed(2)}</span>
                        <button class="buy-btn" onclick="openMarketplaceMenu('${item._id}')">Acquire Asset</button>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
                
                // On Home screen, we show a simplified version (Social Feed)
                feed.insertAdjacentHTML('beforeend', `
                    <p style="font-size:11px; color:#555; border-bottom:1px solid #111; padding-bottom:10px;">
                        <i class="fa-solid fa-circle-check" style="color:var(--green)"></i> 
                        New Asset Deployed: <b>${item.product_name}</b> available in Marketplace.
                    </p>
                `);
            });
        }

        window.onload = function() {
            verifyEmpireAuthority();
            // If already verified, skip gate
            if(localStorage.getItem('token') === 'FOUNDER_001') {
                bypassGate();
            }
        };

        // Search Filter
        document.getElementById('global-search').addEventListener('input', (e) => {
            const s = e.target.value.toLowerCase();
            renderUI(allProducts.filter(p => p.product_name.toLowerCase().includes(s)));
        });
    </script>
</body>
</html>
