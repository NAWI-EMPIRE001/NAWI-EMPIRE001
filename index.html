<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="description" content="NAWI EMPIRE: A Global Sovereign Home for P2P Trade, Professional Assets, and Secure Founding. Built for the World.">
    <meta name="keywords" content="Global Marketplace, P2P Trade, Secure Escrow, Professional Assets, 7 Pillars, Worldwide Kitchen Meals">
    
    <title>NAWI EMPIRE | GLOBAL HOME</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --glass: rgba(255, 255, 255, 0.05); --black: #080808; }
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* --- Auth Gate --- */
        #auth-gate { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #111 0%, #000 100%); padding: 20px; text-align: center; z-index: 3000; position: fixed; width: 100%; top: 0; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .authority-card { background: rgba(255,255,255,0.03); border: 1px solid var(--gold); border-radius: 24px; padding: 40px 30px; max-width: 400px; width: 100%; backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(212, 175, 55, 0.1); }
        .order-text { font-size: 13px; line-height: 1.8; margin-bottom: 30px; color: #eee; border-left: 3px solid var(--gold); padding-left: 15px; text-align: left; font-style: italic; }
        .gate-btn { background: var(--gold); color: black; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }

        #main-platform { display: none; padding-bottom: 100px; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* --- Global Discovery --- */
        .top-search-container { padding: 25px 15px 15px; background: #000; position: sticky; top: 0; z-index: 1000; }
        .search-wrapper { background: var(--glass); border: 1px solid #222; border-radius: 15px; display: flex; align-items: center; padding: 14px 18px; }
        .search-wrapper input { background: none; border: none; color: white; width: 100%; font-size: 14px; outline: none; margin-left: 10px; }

        /* --- Product Cards --- */
        .feed-wrapper { padding: 15px; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 22px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .global-badge { color: #00ff64; font-size: 9px; font-weight: 900; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .escrow-shield { color: var(--gold); font-size: 10px; font-weight: 900; }

        .product-card h3 { color: #fff; margin: 0; font-size: 17px; text-transform: uppercase; }
        .product-card p { font-size: 12px; color: #888; margin: 8px 0; }
        .price-tag { font-size: 22px; font-weight: 900; color: var(--gold); display: block; margin-top: 10px; }
        .buy-btn { background: var(--gold); color: black; width: 100%; border: none; padding: 15px; margin-top: 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px; cursor: pointer; }

        /* --- Navigation --- */
        #dash-overlay { position: fixed; bottom: -110%; left: 0; width: 100%; height: 85vh; background: var(--black); z-index: 2500; border-top: 2px solid var(--gold); border-radius: 35px 35px 0 0; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 35px 20px; overflow-y: auto; }
        #dash-overlay.active { bottom: 0; }
        
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .tool-item { background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #1a1a1a; text-decoration: none; color: white; }
        .tool-item i { color: var(--gold); font-size: 22px; margin-bottom: 10px; display: block; }
        .tool-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 18px 0 25px; border-top: 1px solid #111; z-index: 2000; }
        .nav-btn { text-align: center; text-decoration: none; color: #444; flex: 1; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn p { font-size: 9px; margin-top: 5px; font-weight: 900; text-transform: uppercase; }
        .plus-btn { background: var(--gold); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -15px; color: black; font-size: 22px; cursor: pointer; border: 4px solid #000; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="authority-card">
            <div style="color:var(--gold); font-weight:900; font-size:10px; margin-bottom:20px; letter-spacing:4px;">EMPIRE MANDATE</div>
            <p class="order-text">
                "This is my order and my authority to protect the founders and this platform... follow the rules of this platform."
            </p>
            <button class="gate-btn" onclick="bypassGate()">Unlock Ecosystem</button>
        </div>
    </div>

    <div id="main-platform">
        <div class="top-search-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="global-search" placeholder="Discover anything in the world...">
            </div>
        </div>

        <div class="feed-wrapper" id="product-display">
            </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn active"><i class="fa-solid fa-house"></i><p>Home</p></a>
            <a href="market.html" class="nav-btn"><i class="fa-solid fa-shop"></i><p>Market</p></a>
            <div class="plus-btn" onclick="toggleDash()"><i class="fa-solid fa-plus"></i></div>
            <a href="inbox.html" class="nav-btn"><i class="fa-solid fa-message"></i><p>Inbox</p></a>
            <a href="profile.html" class="nav-btn"><i class="fa-solid fa-user-shield"></i><p>CEO</p></a>
        </nav>
    </div>

    <div id="dash-overlay">
        <div style="width: 40px; height: 4px; background: #333; border-radius: 10px; margin: 0 auto 25px;"></div>
        <h3 style="color:var(--gold); text-align:center; letter-spacing:4px; font-weight:900; font-size:13px; text-transform: uppercase;">Imperial Dashboard</h3>
        <div class="tool-grid">
            <a href="studio.html" class="tool-item"><i class="fa-solid fa-clapperboard"></i><span>Studio</span></a>
            <a href="gaming.html" class="tool-item"><i class="fa-solid fa-gamepad"></i><span>Gaming</span></a>
            <a href="market.html" class="tool-item"><i class="fa-solid fa-shop"></i><span>Market</span></a>
            <a href="kitchen.html" class="tool-item"><i class="fa-solid fa-utensils"></i><span>Kitchen</span></a>
            <a href="music.html" class="tool-item"><i class="fa-solid fa-music"></i><span>Music</span></a>
            <a href="add-product.html" class="tool-item"><i class="fa-solid fa-plus-circle" style="color:#00ff64;"></i><span>Add Asset</span></a>
        </div>
        <p onclick="toggleDash()" style="text-align:center; color:#555; margin-top:40px; cursor:pointer; font-size:10px; font-weight:900; letter-spacing:3px; text-transform: uppercase;">Dismiss System</p>
    </div>

    <script>
        const API_URL = "https://nawi-empire1.onrender.com";
        let allEmpireProducts = [];

        function toggleDash() { document.getElementById('dash-overlay').classList.toggle('active'); }
        
        function bypassGate() {
            document.getElementById('auth-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('main-platform').style.display = 'block';
                localStorage.setItem('nawi_token', 'FOUNDER_VERIFIED');
                loadGlobalMarket(); 
            }, 800);
        }

        async function loadGlobalMarket() {
            const displayArea = document.getElementById('product-display');
            displayArea.innerHTML = '<p style="text-align:center; color:var(--gold);">SYNCHRONIZING...</p>';
            try {
                const response = await fetch(`${API_URL}/api/get-products`);
                allEmpireProducts = await response.json();
                renderMarket(allEmpireProducts);
            } catch (err) {
                displayArea.innerHTML = `<p style="text-align:center; color:#555;">VAULT SYNC INTERRUPTED</p>`;
            }
        }

        function renderMarket(products) {
            const displayArea = document.getElementById('product-display');
            displayArea.innerHTML = ''; 
            if(products.length === 0) {
                displayArea.innerHTML = `<p style="text-align:center; padding:60px 20px; color:#444;">THE VAULT IS EMPTY.</p>`;
                return;
            }
            products.forEach(item => {
                displayArea.insertAdjacentHTML('beforeend', `
                    <div class="product-card">
                        <div class="card-meta">
                            <span class="global-badge">🌍 GLOBAL ACTIVE</span>
                            <span class="escrow-shield">🛡️ ESCROW ACTIVE</span>
                        </div>
                        <h3>${item.product_name}</h3>
                        <p>${item.category || 'Professional Asset'} | SOVEREIGN GRADE</p>
                        <span class="price-tag">$${parseFloat(item.price).toFixed(2)}</span>
                        <button class="buy-btn" onclick="alert('P2P Gateway Initiated...')">Acquire Asset</button>
                    </div>
                `);
            });
        }

        document.getElementById('global-search').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase().trim();
            renderMarket(allEmpireProducts.filter(p => p.product_name.toLowerCase().includes(search)));
        });

        window.onload = function() {
            if(localStorage.getItem('nawi_token') === 'FOUNDER_VERIFIED') {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('main-platform').style.display = 'block';
                loadGlobalMarket();
            }
        };
    </script>
</body>
</html>
