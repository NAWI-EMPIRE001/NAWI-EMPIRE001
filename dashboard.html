<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const isNewUser = urlParams.get('new');
        
        // Trigger orientation only if the URL contains ?new=true
        if (isNewUser === 'true') { 
            showEmpireOrientation(); 
        }
    };

    function showEmpireOrientation() {
        // Create the Overlay Background
        const guideBox = document.createElement('div');
        guideBox.id = "orientation-overlay";
        guideBox.style.cssText = `
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 10000; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(10px);
        `;

        // The Luxurious Authority Card Content
        guideBox.innerHTML = `
            <div style="width: 85%; max-width: 400px; background: #0a0a0a; border: 1px solid #D4AF37; border-radius: 24px; padding: 35px; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);">
                <div style="margin-bottom: 20px;">
                    <i class="fa-solid fa-gem" style="color:#D4AF37; font-size: 45px; filter: drop-shadow(0 0 10px #D4AF37);"></i>
                </div>
                
                <h2 style="color:#D4AF37; font-family: sans-serif; font-weight: 900; font-size: 15px; letter-spacing: 4px; margin-bottom: 15px; text-transform: uppercase;">
                    Welcome to the Empire
                </h2>
                
                <p style="font-size: 12px; color: #bbbbbb; line-height: 1.6; margin-bottom: 25px; font-family: sans-serif;">
                    You have been granted <span style="color:#D4AF37; font-weight:bold;">10 Empire Coins</span> as a foundation bonus. Use them wisely to build your legacy.
                </p>

                <div style="text-align: left; margin: 25px 0; font-size: 11px; color: #ffffff; font-family: sans-serif; border-top: 1px solid #222; padding-top: 20px;">
                    <p style="margin-bottom: 12px;">💎 <b style="color:#D4AF37; margin-left: 5px;">PILLAR 1:</b> Access the Marketplace.</p>
                    <p style="margin-bottom: 12px;">💎 <b style="color:#D4AF37; margin-left: 5px;">PILLAR 2:</b> Build your Studio.</p>
                    <p style="margin-bottom: 12px;">💎 <b style="color:#D4AF37; margin-left: 5px;">PILLAR 3:</b> Connect with global Citizens.</p>
                </div>

                <button onclick="closeOrientation()" style="background:#D4AF37; border:none; width:100%; padding:18px; border-radius:15px; font-weight:900; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #000; cursor:pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);">
                    Start My Journey
                </button>
            </div>
        `;

        document.body.appendChild(guideBox);
    }

    // Smooth Close Function
    function closeOrientation() {
        const overlay = document.getElementById('orientation-overlay');
        if (overlay) {
            overlay.style.opacity = '0';
            overlay.style.transition = '0.5s';
            setTimeout(() => {
                overlay.remove();
                // Clean the URL so the popup doesn't show again on refresh
                window.history.replaceState({}, document.title, window.location.pathname);
            }, 500);
        }
    }
</script>
